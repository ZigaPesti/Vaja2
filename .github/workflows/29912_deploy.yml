name: "29912 Dostava Docker (DockerHub)"

on:
  workflow_run:
    workflows:
      - "29912 Testiranje ELF Analiza"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:

  dostavi-docker:
    name: "Docker Build & Push na DockerHub"
    runs-on: self-hosted
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Pridobi kodo (checkout)
        uses: actions/checkout@v4
      - name: Prenesi artefakt 'napaka' iz testnega workflow-a
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: 29912_test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: napaka
          path: .
      - name: Preveri vsebino napaka.txt
        if: github.event_name == 'workflow_run'
        run: |
          if [ -s napaka.txt ]; then
            cat napaka.txt
            exit 1
          fi
      - name: Prijava v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Nastavi Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Pripravi Docker metapodatke
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/elf-analiza
          tags: |
            type=raw,value=latest
            type=sha,prefix=git-
      - name: Zgradi in potisni Docker zabojnik
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Povzetek dostave
        run: |
          echo "Docker image uspešno objavljen." >> $GITHUB_STEP_SUMMARY
          echo "Repo: \`${{ secrets.DOCKERHUB_USERNAME }}/elf-analiza\`" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

name: "29912 Dostava Docker (DockerHub)"

on:
  workflow_run:
    # Skripta se zažene samodejno po zaključku testnega workflow-a
    workflows:
      - "29912 Testiranje Radix Sort" # Ime se mora popolnoma ujemati z yml datoteko testov!
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Omogoča po potrebi tudi ročni zagon v vmesniku GitHub

jobs:
  dostavi-docker:
    name: "Docker Build & Push na DockerHub"
    runs-on: self-hosted
    # Workflow prožimo le ob ročnem zagonu ALI če so bili testi uspešni
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Pridobi kodo (checkout)
        uses: actions/checkout@v4
        
      - name: Prenesi artefakt 'napaka' iz testnega workflow-a
        # Ker gre za ločena workflow-a, navadni prenos ne deluje, zato uporabimo posebno akcijo
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: 29912_test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: napaka
          path: .
          
      - name: Preveri vsebino napaka.txt
        # Tudi tu preverimo artefakt, kot je zahtevano v navodilih
        if: github.event_name == 'workflow_run'
        run: |
          if [ -s napaka.txt ]; then
            echo "Datoteka z napako ni prazna. Prekinjam potiskanje zabojnika."
            cat napaka.txt
            exit 1
          fi
          
      - name: Prijava v DockerHub
        # Uporaba tajnosti (secrets), ki jih nastaviš v GitHub Settings
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Nastavi Docker Buildx
        # Orodje za učinkovitejše grajenje Docker slik
        uses: docker/setup-buildx-action@v3
        
      - name: Pripravi Docker metapodatke
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Nastavite ustrezno ime slike (tukaj poimenovano po tvoji nalogi)
          images: ${{ secrets.DOCKERHUB_USERNAME }}/radix-sort
          tags: |
            type=raw,value=latest
            type=sha,prefix=git-
            
      - name: Zgradi in potisni Docker zabojnik
        # Avtomatska zgradba iz priloženega Dockerfile-a in objava na DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Povzetek dostave
        # Za lepši prikaz rezultata na koncu workflow-a
        run: |
          echo "Docker image uspešno objavljen." >> $GITHUB_STEP_SUMMARY
          echo "Repo: \`${{ secrets.DOCKERHUB_USERNAME }}/radix-sort\`" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY